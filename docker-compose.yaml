# ─────────────────────────────────────────────────────────────────────────────
# Observability Stack
# Services: Alloy, Prometheus, Loki, Tempo, Grafana
# 
# NOTE: Application services are NOT included in this configuration.
#       The following services will be added separately once the observability
#       stack is validated:
#       - forex-service (HTTP API, 8001) + fx-worker + fx-beat
#       - ledger-service (HTTP API, 8002)
#       - payment-service
#       - rule-engine-service
#       - requestor-service
#       - reconciliation-service
#       - profile-service
#       - banking-service
#       - marketplace-service
#       - admin-service
#       - api-agent-service
#       - wallet-service
#
# Local access:
#   Grafana:    http://localhost:3000  (admin / admin)
#   Alloy UI:   http://localhost:12345
#   Prometheus: http://localhost:9090
#   Loki:       http://localhost:3100
#   Tempo:      http://localhost:3200
#
# AWS ECS notes:
#   - All services use platform: linux/amd64 for Fargate x86_64 compatibility
#   - Config bind mounts (./config/*) → back with EFS in ECS
#   - Named volumes (prometheus_data, etc.) → back with EFS in ECS
#   - Logging driver → swap json-file for awslogs in ECS task definitions
#   - Network mode → use awsvpc in ECS task definitions
#   - Secrets (GF_ADMIN_PASSWORD, etc.) → inject from SSM Parameter Store / Secrets Manager

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

networks:
  observability:
    driver: bridge

volumes:
  prometheus_data: {}
  loki_data: {}
  tempo_data: {}
  grafana_data: {}

services:

  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  COLLECTOR                                                               ║
  # ╚══════════════════════════════════════════════════════════════════════════╝

  alloy:
    image: dhi.io/alloy:1.15.1-debian13-fips
    platform: linux/amd64
    container_name: alloy
    restart: unless-stopped
    ports:
      - "12345:12345"   # Alloy UI + self-metrics
      - "4317:4317"     # OTLP gRPC  — services push traces/metrics/logs here
      - "4318:4318"     # OTLP HTTP  — services push traces/metrics/logs here
    volumes:
      - ./config/alloy/config.alloy:/etc/alloy/config.alloy:ro
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - --stability.level=generally-available
    environment:
      ENVIRONMENT: ${ENVIRONMENT}
    networks:
      - observability
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:12345/-/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging

  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  BACKENDS                                                                ║
  # ╚══════════════════════════════════════════════════════════════════════════╝

  prometheus:
    image: dhi.io/prometheus:3.11.2-debian13-fips
    platform: linux/amd64
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --storage.tsdb.retention.size=15GB
      - --web.enable-remote-write-receiver
      - --web.enable-lifecycle
      - --enable-feature=exemplar-storage
      # native histograms are on by default in Prometheus 3.x — no flag needed
    networks:
      - observability
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging

  loki:
    image: grafana/loki:3.7.0
    platform: linux/amd64
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./config/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki.yml
    user: "0"
    networks:
      - observability
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging: *default-logging

  tempo:
    image: dhi.io/tempo:2.10.3-debian13-fips
    platform: linux/amd64
    container_name: tempo
    restart: unless-stopped
    ports:
      - "3200:3200"
    volumes:
      - ./config/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/tmp/tempo
    command: -config.file=/etc/tempo/tempo.yml
    user: "0"
    networks:
      - observability
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3200/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging: *default-logging

  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  UI                                                                      ║
  # ╚══════════════════════════════════════════════════════════════════════════╝

  grafana:
    image: dhi.io/grafana:12.4.2-debian13-fips
    platform: linux/amd64
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: ${GF_AUTH_ANONYMOUS_ENABLED}
      GF_UNIFIED_ALERTING_ENABLED: ${GF_UNIFIED_ALERTING_ENABLED}
      GF_FEATURE_TOGGLES_ENABLE: ${GF_FEATURE_TOGGLES_ENABLE}
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    networks:
      - observability
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging
